global:
  scrape_interval: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fraud-scoring-api
    metrics_path: /metrics
    static_configs:
      - targets: ["scoring-api:8000"]

  # Only up when the streaming overlay (docker-compose.streaming.yml) is running.
  - job_name: fraud-consumer
    metrics_path: /metrics
    static_configs:
      - targets: ["fraud-consumer:8001"]

  # The drift monitor (fraud.monitoring.drift) pushes PSI / backfill-recall gauges here.
  - job_name: fraud-drift-monitor
    metrics_path: /metrics
    static_configs:
      - targets: ["drift-monitor:9100"]
    honor_labels: true
